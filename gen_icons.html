<!DOCTYPE html>
<html><body>
<canvas id="c48" width="48" height="48"></canvas>
<canvas id="c128" width="128" height="128"></canvas>
<script>
function drawIcon(canvas) {
  const s = canvas.width;
  const ctx = canvas.getContext('2d');
  // Background circle
  ctx.fillStyle = '#10a37f';
  ctx.beginPath();
  ctx.arc(s/2, s/2, s/2-1, 0, Math.PI*2);
  ctx.fill();
  // "Q" text
  ctx.fillStyle = '#fff';
  ctx.font = `bold ${s*0.55}px sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('Q', s/2, s/2+1);
  // Small "+" at bottom-right
  ctx.font = `bold ${s*0.3}px sans-serif`;
  ctx.fillStyle = '#fff';
  ctx.strokeStyle = '#10a37f';
  ctx.lineWidth = s*0.04;
  ctx.strokeText('+', s*0.73, s*0.75);
  ctx.fillText('+', s*0.73, s*0.75);
}
drawIcon(document.getElementById('c48'));
drawIcon(document.getElementById('c128'));
</script>
</body></html>
